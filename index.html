<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Character Ranker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#111827;
color:white;
min-height:100vh;
}

.screen{
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:25px;
}

.start-btn{
background:#16a34a;
border:none;
padding:15px 50px;
font-size:22px;
border-radius:12px;
cursor:pointer;
margin-bottom:40px;
color:white;
font-weight:bold;
}

.start-btn:hover{
background:#15803d;
}

.shows-grid{
width:100%;
max-width:1300px;

display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

.show-card{
background:#1f2937;
border-radius:18px;
padding:15px;
text-align:center;
transition:.2s;
display:flex;
flex-direction:column;
}

.show-card:hover{
transform:translateY(-3px);
}

.show-image{
width:100%;
height:280px;
object-fit:cover;
border-radius:12px;
background:#374151;
}

.show-name{
margin-top:10px;
font-size:16px;
font-weight:600;
flex-grow:1;
display:flex;
align-items:center;
justify-content:center;
}

.toggle{
margin-top:12px;

width:26px;
height:26px;

border-radius:50%;
margin-left:auto;
margin-right:auto;

cursor:pointer;
}

.on{
background:#22c55e;
}

.off{
background:#ef4444;
}

.ranking-screen{
display:none;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:30px;
}

.ranking-screen.active{
display:flex;
}

.progress-text{
font-size:20px;
margin-bottom:20px;
font-weight:600;
}

.comparison-container{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.character-card{
display:flex;
flex-direction:column;
align-items:center;
}

.character-image{
width:300px;
height:420px;
object-fit:cover;
border-radius:16px;
background:#1f2937;
border:2px solid #374151;
}

.character-btn{
width:300px;
margin-top:15px;
padding:14px;
font-size:18px;
cursor:pointer;
background:#16a34a;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
transition:.2s;
}

.character-btn:hover{
background:#15803d;
transform:scale(1.02);
}

.results-screen{
display:none;
flex-direction:column;
align-items:center;
padding:40px;
max-width:900px;
margin:0 auto;
}

.results-screen.active{
display:flex;
}

.results-title{
font-size:36px;
font-weight:bold;
margin-bottom:40px;
}

.results-list{
width:100%;
display:flex;
flex-direction:column;
gap:15px;
}

.result-item{
display:flex;
align-items:center;
padding:20px;
background:#1f2937;
border-radius:12px;
gap:20px;
}

.result-rank{
font-size:24px;
font-weight:bold;
color:#22c55e;
min-width:50px;
}

.result-info{
flex-grow:1;
}

.result-name{
font-size:18px;
font-weight:600;
}

.result-show{
font-size:14px;
color:#9ca3af;
margin-top:5px;
}

.back-btn{
background:#6366f1;
border:none;
padding:12px 30px;
font-size:16px;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:bold;
margin-top:40px;
}

.back-btn:hover{
background:#4f46e5;
}

@media(max-width:1200px){

.shows-grid{
grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:900px){

.shows-grid{
grid-template-columns:repeat(2,1fr);
}

.comparison-container{
gap:20px;
}

}

@media(max-width:600px){

.shows-grid{
grid-template-columns:1fr;
}

.comparison-container{
flex-direction:column;
}

.character-image{
width:250px;
height:350px;
}

.character-btn{
width:250px;
}

}

</style>

let selectedShows =
JSON.parse(
localStorage.getItem("selectedShows")
) || {};

const grid =
document.getElementById("showsGrid");

SHOWS.forEach(show=>{

if(selectedShows[show.name]===undefined)
selectedShows[show.name]=true;

const card=document.createElement("div");
card.className="show-card";

card.innerHTML=`

<img
class="show-image"
src="${show.image}"
>

<div class="show-name">
${show.name}
</div>

<div
class="toggle ${selectedShows[show.name] ? "on":"off"}"
></div>

`;

const toggle=
card.querySelector(".toggle");

toggle.onclick=()=>{

selectedShows[show.name]=
!selectedShows[show.name];

toggle.classList.toggle("on");
toggle.classList.toggle("off");
  
save();

  updateCharacterCount();
  
};

grid.appendChild(card);
  
});

updateCharacterCount();

function save(){

localStorage.setItem(
"selectedShows",
JSON.stringify(selectedShows)
);

}

function updateCharacterCount(){

let total = 0;

Object.keys(selectedShows)
.forEach(show=>{

if(selectedShows[show]){

total +=
CHARACTER_DB[show]?.length || 0;

}

});

document.getElementById(
"charCount"
).textContent =
total + " Characters";

}
  
function firstNameImage(name){

const cleanName =
name
.toLowerCase()
.replace(/[^a-z0-9 ]/g,"")
.trim()
.replace(/\s+/g,"_");

return `characters/${cleanName}.jpg`;

}

let mergeState = null;
let totalComparisonsEstimate = 0;
let completedComparisons = 0;

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=
[array[j],array[i]];

}

return array;

}

function getNextMerge(){

if(
mergeState.leftList &&
mergeState.rightList
){

return;

}

if(
mergeState.lists.length === 1
){

showResults(mergeState.lists[0]);
return;

}

const nextRound = [];

for(
let i=0;
i<mergeState.lists.length;
i+=2
){

if(
i+1 >= mergeState.lists.length
){

nextRound.push(
mergeState.lists[i]
);

continue;

}

nextRound.push({

left:mergeState.lists[i],
right:mergeState.lists[i+1]

});

}

const pair =
nextRound.find(
x => x.left && x.right
);

if(!pair){
return;
}

mergeState.nextRound =
nextRound;

mergeState.leftList =
pair.left;

mergeState.rightList =
pair.right;

mergeState.leftIndex = 0;
mergeState.rightIndex = 0;
mergeState.merged = [];

showComparison();

}

function chooseWinner(leftWon){

completedComparisons++;

if(leftWon){

mergeState.merged.push(

mergeState.leftList[
mergeState.leftIndex
]

);

mergeState.leftIndex++;

}else{

mergeState.merged.push(

mergeState.rightList[
mergeState.rightIndex
]

);

mergeState.rightIndex++;

}

while(

mergeState.leftIndex >=
mergeState.leftList.length

&&

mergeState.rightIndex <
mergeState.rightList.length

){

mergeState.merged.push(

mergeState.rightList[
mergeState.rightIndex++
]

);

}

while(

mergeState.rightIndex >=
mergeState.rightList.length

&&

mergeState.leftIndex <
mergeState.leftList.length

){

mergeState.merged.push(

mergeState.leftList[
mergeState.leftIndex++
]

);

}

if(

mergeState.leftIndex >=
mergeState.leftList.length

&&

mergeState.rightIndex >=
mergeState.rightList.length

){

const nextRound = 
mergeState.nextRound;

const finishedMergeIndex =
nextRound.findIndex(
x => x === mergeState ||
(x.left === mergeState.leftList &&
x.right === mergeState.rightList)
);

if(finishedMergeIndex >= 0){

nextRound[finishedMergeIndex] =
mergeState.merged;

}

mergeState.lists =
nextRound.filter(x => x);

mergeState.leftList = null;
mergeState.rightList = null;

getNextMerge();

}else{

showComparison();

}

}

function showComparison(){

const container =
document.getElementById("comparisonContainer");

container.innerHTML = "";

const leftChar =
mergeState.leftList[
mergeState.leftIndex
];

const rightChar =
mergeState.rightList[
mergeState.rightIndex
];

const progress =
document.getElementById("progressText");

progress.textContent = 
`${completedComparisons} / ${totalComparisonsEstimate}`;

const leftCard = document.createElement("div");
leftCard.className = "character-card";

leftCard.innerHTML = `

<img 
class="character-image" 
src="${firstNameImage(leftChar.name)}" 
alt="${leftChar.name}"
>

<div style="text-align:center;margin-top:10px;">

<div style="font-weight:bold;">${leftChar.name}</div>

<div style="font-size:12px;color:#9ca3af;">${leftChar.show}</div>

</div>

<button class="character-btn">Choose</button>

`;

const leftBtn = leftCard.querySelector(".character-btn");
leftBtn.onclick = () => chooseWinner(true);

const rightCard = document.createElement("div");
rightCard.className = "character-card";

rightCard.innerHTML = `

<img 
class="character-image" 
src="${firstNameImage(rightChar.name)}" 
alt="${rightChar.name}"
>

<div style="text-align:center;margin-top:10px;">

<div style="font-weight:bold;">${rightChar.name}</div>

<div style="font-size:12px;color:#9ca3af;">${rightChar.show}</div>

</div>

<button class="character-btn">Choose</button>

`;

const rightBtn = rightCard.querySelector(".character-btn");
rightBtn.onclick = () => chooseWinner(false);

container.appendChild(leftCard);
container.appendChild(rightCard);

}

function showResults(finalRanking){

document.getElementById("rankingScreen").classList.remove("active");
document.getElementById("resultsScreen").classList.add("active");

const resultsList =
document.getElementById("resultsList");

resultsList.innerHTML = "";

finalRanking.forEach((char, index) => {

const item = document.createElement("div");
item.className = "result-item";

item.innerHTML = `

<div class="result-rank">${index + 1}</div>

<img 
style="width:60px;height:80px;border-radius:8px;object-fit:cover;" 
src="${firstNameImage(char.name)}" 
alt="${char.name}"
>

<div class="result-info">

<div class="result-name">${char.name}</div>

<div class="result-show">${char.show}</div>

</div>

`;

resultsList.appendChild(item);

});

}

function startRanking(activeShows){

const selectedCharacters = [];

activeShows.forEach(show=>{

if(!CHARACTER_DB[show]) return;

CHARACTER_DB[show].forEach(character=>{

selectedCharacters.push({

name:character,
show:show

});

});

});

if(selectedCharacters.length < 2){

alert("Select at least one show with 2 characters");
return;

}

const rankingPool = [...selectedCharacters];

shuffle(rankingPool);

mergeState = {

lists: rankingPool.map(character => [character]),

leftList:null,
rightList:null,

leftIndex:0,
rightIndex:0,

merged:[],

phase:"merge",

nextRound:[]

};

totalComparisonsEstimate =
Math.ceil(
selectedCharacters.length *
Math.log2(selectedCharacters.length)
);

completedComparisons = 0;

document.getElementById("mainScreen").classList.remove("active");
document.getElementById("rankingScreen").classList.add("active");
document.getElementById("resultsScreen").classList.remove("active");

getNextMerge();

}

document.getElementById("startBtn").onclick = () => {

const activeShows = Object.keys(selectedShows)
.filter(show => selectedShows[show]);

startRanking(activeShows);

};

document.getElementById("backBtn").onclick = () => {

document.getElementById("mainScreen").classList.add("active");
document.getElementById("resultsScreen").classList.remove("active");

};

</script>
