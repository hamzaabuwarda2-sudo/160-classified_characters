<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Character Ranker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#111827;
color:white;
min-height:100vh;
}

.screen{
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:25px;
}

.start-btn{
background:#16a34a;
border:none;
padding:15px 50px;
font-size:22px;
border-radius:12px;
cursor:pointer;
margin-bottom:40px;
color:white;
font-weight:bold;
}

.start-btn:hover{
background:#15803d;
}

.shows-grid{
width:100%;
max-width:1300px;

display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

.show-card{
background:#1f2937;
border-radius:18px;
padding:15px;
text-align:center;
transition:.2s;
display:flex;
flex-direction:column;
}

.show-card:hover{
transform:translateY(-3px);
}

.show-image{
width:100%;
height:280px;
object-fit:cover;
border-radius:12px;
background:#374151;
}

.show-name{
margin-top:10px;
font-size:16px;
font-weight:600;
flex-grow:1;
display:flex;
align-items:center;
justify-content:center;
}

.toggle{
margin-top:12px;

width:26px;
height:26px;

border-radius:50%;
margin-left:auto;
margin-right:auto;

cursor:pointer;
}

.on{
background:#22c55e;
}

.off{
background:#ef4444;
}

.ranking-screen{
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:30px;
}

.progress-text{
font-size:20px;
margin-bottom:20px;
font-weight:600;
}

.comparison-container{
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
}

.character-card{
display:flex;
flex-direction:column;
align-items:center;
}

.character-image{
width:300px;
height:420px;
object-fit:cover;
border-radius:16px;
background:#1f2937;
border:2px solid #374151;
}

.character-btn{
width:300px;
margin-top:15px;
padding:14px;
font-size:18px;
cursor:pointer;
background:#16a34a;
border:none;
border-radius:8px;
color:white;
font-weight:bold;
transition:.2s;
}

.character-btn:hover{
background:#15803d;
transform:scale(1.02);
}

.results-screen{
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
max-width:900px;
margin:0 auto;
}

.results-title{
font-size:36px;
font-weight:bold;
margin-bottom:40px;
}

.results-list{
width:100%;
display:flex;
flex-direction:column;
gap:15px;
}

.result-item{
display:flex;
align-items:center;
padding:20px;
background:#1f2937;
border-radius:12px;
gap:20px;
}

.result-rank{
font-size:24px;
font-weight:bold;
color:#22c55e;
min-width:50px;
}

.result-info{
flex-grow:1;
}

.result-name{
font-size:18px;
font-weight:600;
}

.result-show{
font-size:14px;
color:#9ca3af;
margin-top:5px;
}

.back-btn{
background:#6366f1;
border:none;
padding:12px 30px;
font-size:16px;
border-radius:8px;
cursor:pointer;
color:white;
font-weight:bold;
margin-top:40px;
}

.back-btn:hover{
background:#4f46e5;
}

@media(max-width:1200px){

.shows-grid{
grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:900px){

.shows-grid{
grid-template-columns:repeat(2,1fr);
}

.comparison-container{
gap:20px;
}

}

@media(max-width:600px){

.shows-grid{
grid-template-columns:1fr;
}

.comparison-container{
flex-direction:column;
}

.character-image{
width:250px;
height:350px;
}

.character-btn{
width:250px;
}

}

</style>

let selectedShows =
JSON.parse(
localStorage.getItem("selectedShows")
) || {};

const grid =
document.getElementById("showsGrid");

SHOWS.forEach(show=>{

if(selectedShows[show.name]===undefined)
selectedShows[show.name]=true;

const card=document.createElement("div");
card.className="show-card";

card.innerHTML=`

<img
class="show-image"
src="${show.image}"
>

<div class="show-name">
${show.name}
</div>

<div
class="toggle ${selectedShows[show.name] ? "on":"off"}"
></div>

`;

const toggle=
card.querySelector(".toggle");

toggle.onclick=()=>{

selectedShows[show.name]=
!selectedShows[show.name];

toggle.classList.toggle("on");
toggle.classList.toggle("off");

save();

};

grid.appendChild(card);

});

function save(){

localStorage.setItem(
"selectedShows",
JSON.stringify(selectedShows)
);

}

function updateCharacterCount(){

let total = 0;

Object.keys(selectedShows)
.forEach(show=>{

if(selectedShows[show]){

total +=
CHARACTER_DB[show]?.length || 0;

}

});

document.getElementById(
"charCount"
).textContent =
total + " Characters";

}
  
function startRanking(activeShows){

const selectedCharacters = [];

activeShows.forEach(show=>{

if(!CHARACTER_DB[show]) return;

CHARACTER_DB[show].forEach(character=>{

selectedCharacters.push({

name:character,
show:show

});

});

});

if(selectedCharacters.length < 2){

alert("Select at least one show with 2 characters");
return;

}

const rankingPool = [...selectedCharacters];

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(Math.random()*(i+1));

[array[i],array[j]]=
[array[j],array[i]];

}

return array;

}

shuffle(rankingPool);

let mergeState = {

lists: rankingPool.map(character => [character]),

leftList:null,
rightList:null,

leftIndex:0,
rightIndex:0,

merged:[],

phase:"merge"

};

let totalComparisonsEstimate =
Math.ceil(
selectedCharacters.length *
Math.log2(selectedCharacters.length)
);

let completedComparisons = 0;
  function firstNameImage(name){

const cleanName =
name
.toLowerCase()
.replace(/[^a-z0-9 ]/g,"")
.trim()
.replace(/\s+/g,"_");

return `characters/${cleanName}.jpg`;

  }

  function getNextMerge(){

if(
mergeState.leftList &&
mergeState.rightList
){

return;

}

if(
mergeState.lists.length === 1
){

showResults(
mergeState.lists[0]
);

return;

}

const nextRound = [];

for(
let i=0;
i<mergeState.lists.length;
i+=2
){

if(
i+1 >= mergeState.lists.length
){

nextRound.push(
mergeState.lists[i]
);

continue;

}

nextRound.push({

left:mergeState.lists[i],
right:mergeState.lists[i+1]

});

}

const pair =
nextRound.find(
x => x.left
);

mergeState.nextRound =
nextRound;

mergeState.leftList =
pair.left;

mergeState.rightList =
pair.right;

mergeState.leftIndex = 0;
mergeState.rightIndex = 0;
mergeState.merged = [];

showComparison();

  }

  function chooseWinner(leftWon){

completedComparisons++;

if(leftWon){

mergeState.merged.push(

mergeState.leftList[
mergeState.leftIndex
]

);

mergeState.leftIndex++;

}else{

mergeState.merged.push(

mergeState.rightList[
mergeState.rightIndex
]

);

mergeState.rightIndex++;

}

while(

mergeState.leftIndex >=
mergeState.leftList.length

&&

mergeState.rightIndex <
mergeState.rightList.length

){

mergeState.merged.push(

mergeState.rightList[
mergeState.rightIndex++
]

);

}

while(

mergeState.rightIndex >=
mergeState.rightList.length

&&

mergeState.leftIndex <
mergeState.leftList.length

){

mergeState.merged.push(

mergeState.leftList[
mergeState.leftIndex++
]

);

}

if(

mergeState.leftIndex >=
mergeState.leftList.length

&&

mergeState.rightIndex >=
mergeState.rightList.length

){

const index =
mergeState.nextRound.findIndex(
x => x.left
);

mergeState.nextRound[index] =
mergeState.merged;

mergeState.lists =
mergeState.nextRound.filter(
x => Array.isArray(x)
);

mergeState.leftList = null;
mergeState.rightList = null;

getNextMerge();

return;

}

    getNextMerge();

  }

function showComparison(){

if(!mergeState.leftList){

getNextMerge();
return;

}

const left =
mergeState.leftList[
mergeState.leftIndex
];

const right =
mergeState.rightList[
mergeState.rightIndex
];

document.querySelector(
".ranking-screen"
).innerHTML = `

<div class="progress-text">

${completedComparisons}
 /
${totalComparisonsEstimate}

</div>

<div class="comparison-container">

<div class="character-card">

class="character-image"

>

<button
class="character-btn"
id="leftBtn"

${left.name}

</button>

</div>

<div class="character-card">

<img
class="character-image"
src="${firstNameImage(right.name)}"
>

<button
class="character-btn"
id="rightBtn"
>

${right.name}

</button>

</div>

</div>

`;

document
.getElementById("leftBtn")
.onclick = ()=>chooseWinner(true);

document
.getElementById("rightBtn")
.onclick = ()=>chooseWinner(false);

}

function showResults(ranking){

localStorage.setItem(
"lastRanking",
JSON.stringify(ranking)
);

const exportText =
ranking
.map((c,i)=>
`${i+1}. ${c.name}`
)
.join("\n");
  
document.body.innerHTML = `

<div class="results-screen">

<h1 class="results-title">

Final Ranking

</h1>

<div class="results-list">

${ranking.slice(0,25).map((c,i)=>`

<div class="result-item">

<div class="result-rank">

#${i+1}

</div>

<div class="result-info">

<div class="result-name">

${c.name}

</div>

<div class="result-show">

${c.show}

</div>

</div>

</div>

`).join("")}

<button
class="back-btn"
onclick='navigator.clipboard.writeText(`${exportText}`)'
>

Copy Ranking

</button>

<button
class="back-btn"
onclick="location.reload()"
>

Restart

</button>

</div>

</div>

`;

  }  
document.body.innerHTML = `

<div class="ranking-screen">

<div class="progress-text">Loading...</div>

</div>

`;

showComparison();

}

document

.onclick=()=>{

save();

const activeShows=
Object.keys(selectedShows)
.filter(show=>selectedShows[show]);

if(activeShows.length === 0){
alert("Please select at least one show");
return;
}

localStorage.setItem(
"activeShows",
JSON.stringify(activeShows)
);

startRanking(activeShows);

};
