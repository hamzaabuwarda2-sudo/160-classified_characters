<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Character Ranker</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#111827;
color:white;
min-height:100vh;
}

.screen{
display:flex;
flex-direction:column;
align-items:center;
padding:40px;
}

.logo{
font-size:38px;
font-weight:bold;
margin-bottom:25px;
}

.start-btn{
background:#16a34a;
border:none;
padding:15px 50px;
font-size:22px;
border-radius:12px;
cursor:pointer;
margin-bottom:40px;
color:white;
font-weight:bold;
}

.start-btn:hover{
background:#15803d;
}

.shows-grid{
width:100%;
max-width:1300px;

display:grid;
grid-template-columns:repeat(4,1fr);
gap:25px;
}

.show-card{
background:#1f2937;
border-radius:18px;
padding:15px;
text-align:center;
transition:.2s;
display:flex;
flex-direction:column;
}

.show-card:hover{
transform:translateY(-3px);
}

.show-image{
width:100%;
height:280px;
object-fit:cover;
border-radius:12px;
background:#374151;
}

.show-name{
margin-top:10px;
font-size:16px;
font-weight:600;
flex-grow:1;
display:flex;
align-items:center;
justify-content:center;
}

.toggle{
margin-top:12px;

width:26px;
height:26px;

border-radius:50%;
margin-left:auto;
margin-right:auto;

cursor:pointer;
}

.on{
background:#22c55e;
}

.off{
background:#ef4444;
}

@media(max-width:1200px){

.shows-grid{
grid-template-columns:repeat(3,1fr);
}

}

@media(max-width:900px){

.shows-grid{
grid-template-columns:repeat(2,1fr);
}

}

@media(max-width:600px){

.shows-grid{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<div class="screen">

<div class="logo">
Character Ranker
</div>

<button class="start-btn" id="startBtn">
START
</button>

<div class="shows-grid" id="showsGrid">
</div>

</div>

<script>

const SHOWS = [

{
name:"GAME OF THRONES",
image:"shows/game_of_thrones.jpg"
},

{
name:"VIKINGS",
image:"shows/vikings.jpg"
},

{
name:"BREAKING BAD",
image:"shows/breaking_bad.jpg"
},

{
name:"THE SOPRANOS",
image:"shows/the_sopranos.jpg"
},

{
name:"THE WALKING DEAD",
image:"shows/the_walking_dead.jpg"
},

{
name:"DEXTER",
image:"shows/dexter.jpg"
},

{
name:"PEAKY BLINDERS",
image:"shows/peaky_blinders.jpg"
},

{
name:"THE LAST KINGDOM",
image:"shows/the_last_kingdom.jpg"
},

{
name:"THE PENGUIN",
image:"shows/the_penguin.jpg"
},

{
name:"TRUE DETECTIVE",
image:"shows/true_detective.jpg"
},

{
name:"REACHER",
image:"shows/reacher.jpg"
},

{
name:"THE BOYS",
image:"shows/the_boys.jpg"
},

{
name:"FROM",
image:"shows/from.jpg"
},

{
name:"PRISON BREAK",
image:"shows/prison_break.jpg"
},

{
name:"THE PUNISHER",
image:"shows/the_punisher.jpg"
},

{
name:"YOU",
image:"shows/you.jpg"
},

{
name:"HANNIBAL",
image:"shows/hannibal.jpg"
},

{
name:"DAREDEVIL",
image:"shows/daredevil.jpg"
},

{
name:"HOUSE OF THE DRAGON",
image:"shows/house_of_the_dragon.jpg"
},

{
name:"LA CASA DE PAPEL",
image:"shows/la_casa_de_papel.jpg"
},

{
name:"BAND OF BROTHERS",
image:"shows/band_of_brothers.jpg"
},

{
name:"WEDNESDAY",
image:"shows/wednesday.jpg"
},

{
name:"SQUID GAME",
image:"shows/squid_game.jpg"
},

{
name:"A KNIGHT OF THE 7 KINGDOMS",
image:"shows/a_knight_of_the_7_kingdoms.jpg"
},

{
name:"ELITE",
image:"shows/elite.jpg"
},

{
name:"GEN V",
image:"shows/gen_v.jpg"
}

const CHARACTER_DB = {

  "THE WALKING DEAD":[
"Rick Grimes",
"Daryl Dixon",
"Negan",
"Glenn Rhee",
"Shane Walshie",
"Abraham Ford",
"Carl Grimes",
"Maggie Greene",
"Judith Grimes",
"Tyreese Williams",
"Enid"
],

"DEXTER":[
"Dexter Morgan",
"Debra Morgan",
"James Doakes",
"Arthur Mitchell",
"Angel Batista",
"Brian Moser",
"Harrison Morgan",
"Vince Masuka",
"Rita Bennett",
"Miguel Prado",
"Hannah Mckay"
]
  
"GAME OF THRONES":[
"Jon Snow",
"Tyrion Lannister",
"Daenerys Targaryen",
"Cersei Lannister",
"Jaime Lannister",
"Sandor Clegane",
"Ned Stark",
"Petyr Baelish",
"Lord Varys",
"Jorah Mormont",
"Bronn",
"Tywin Lannister",
"Joffrey Baratheon",
"Ramsay Bolton",
"Robert Baratheon"
],

"VIKINGS":[
"Ragnar Lothbrok",
"Bjorn Ironside",
"Ivar the Boneless",
"Floki",
"Lagertha",
"Ubbe Lothbrok",
"Hvitserk Lothbrok",
"Sigurd Snake In The Eye",
"Rollo Sigurdsson",
"King Ecbert",
"Harald Finehair"
],

"BREAKING BAD":[
"Walter White",
"Jesse Pinkman",
"Saul Goodman",
"Gustavo Fring",
"Hank Schrader",
"Mike Ehrmantraut"
]

};
  
];

let selectedShows =
JSON.parse(
localStorage.getItem("selectedShows")
) || {};

const grid =
document.getElementById("showsGrid");

SHOWS.forEach(show=>{

if(selectedShows[show.name]===undefined)
selectedShows[show.name]=true;

const card=document.createElement("div");
card.className="show-card";

card.innerHTML=`

<img
class="show-image"
src="${show.image}"
>

<div class="show-name">
${show.name}
</div>

<div
class="toggle ${selectedShows[show.name] ? "on":"off"}"
></div>

`;

const toggle=
card.querySelector(".toggle");

toggle.onclick=()=>{

selectedShows[show.name]=
!selectedShows[show.name];

toggle.classList.toggle("on");
toggle.classList.toggle("off");

save();

};

grid.appendChild(card);

});

function save(){

localStorage.setItem(
"selectedShows",
JSON.stringify(selectedShows)
);

}

function startRanking(activeShows){

document.body.innerHTML=`

<div id="rankingScreen"
style="
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
min-height:100vh;
padding:30px;
">

<div id="progressText"
style="
font-size:20px;
margin-bottom:20px;
">
Loading...
</div>

<div
style="
display:flex;
gap:40px;
flex-wrap:wrap;
justify-content:center;
">

<div class="characterCard">

<img
id="leftImage"
style="
width:300px;
height:420px;
object-fit:cover;
border-radius:16px;
background:#1f2937;
">

<button
id="leftBtn"
style="
width:300px;
margin-top:15px;
padding:14px;
font-size:20px;
cursor:pointer;
">
Character A
</button>

</div>

<div class="characterCard">

<img
id="rightImage"
style="
width:300px;
height:420px;
object-fit:cover;
border-radius:16px;
background:#1f2937;
">

<button
id="rightBtn"
style="
width:300px;
margin-top:15px;
padding:14px;
font-size:20px;
cursor:pointer;
">
Character B
</button>

</div>

</div>

</div>

`;
  
const selectedCharacters = [];

activeShows.forEach(show=>{

if(!CHARACTER_DB[show]) return;

CHARACTER_DB[show].forEach(character=>{

selectedCharacters.push({

name:character,
show:show

});

});

});
  
let comparisons = [];
let comparisonIndex = 0;

function shuffle(array){

for(let i=array.length-1;i>0;i--){

const j=Math.floor(
Math.random()*(i+1)
);

[array[i],array[j]] =
[array[j],array[i]];

}

return array;

}

const rankingPool =
shuffle(
[...selectedCharacters]
);
  
if(selectedCharacters.length < 2){

alert("Select at least one show with 2 characters");

location.reload();

return;

}

let leftCharacter = null;
let rightCharacter = null;
  
function firstNameImage(name){

const first =
name
.split(" ")[0]
.toLowerCase()
.replace(/[^a-z0-9]/g,"");

const duplicates =
selectedCharacters.filter(c =>

c.name
.split(" ")[0]
.toLowerCase()
.replace(/[^a-z0-9]/g,"")

=== first

);

if(duplicates.length === 1){

return `characters/${first}.jpg`;

}

const full =
name
.toLowerCase()
.replace(/[^a-z0-9 ]/g,"")
.trim()
.replace(/\s+/g,"_");

return `characters/${full}.jpg`;

}

function showComparison(){

if(rankingPool.length < 2){

document.body.innerHTML = `

<h1 style="
text-align:center;
margin-top:100px;
">
Preparing Merge Sort...
</h1>

`;

console.log(comparisons);

return;

}

leftCharacter =
rankingPool[
Math.floor(
Math.random()*rankingPool.length
)
];

do{

rightCharacter =
rankingPool[
Math.floor(
Math.random()*rankingPool.length
)
];

}
while(
rightCharacter===leftCharacter
);

document.getElementById(
"progressText"
).textContent =

"Comparison " +
(comparisonIndex+1);

document.getElementById(
"leftImage"
).src =
firstNameImage(
leftCharacter.name
);

document.getElementById(
"rightImage"
).src =
firstNameImage(
rightCharacter.name
);

document.getElementById(
"leftBtn"
).textContent =
leftCharacter.name;

document.getElementById(
"rightBtn"
).textContent =
rightCharacter.name;

document.getElementById(
"leftBtn"
).onclick=()=>{

comparisons.push({

winner:leftCharacter.name,
loser:rightCharacter.name

});

comparisonIndex++;

showComparison();

};

document.getElementById(
"rightBtn"
).onclick=()=>{

comparisons.push({

winner:rightCharacter.name,
loser:leftCharacter.name

});

comparisonIndex++;

showComparison();

};

}

showComparison();

}

document
.getElementById("startBtn")
.onclick=()=>{

save();

const activeShows=
Object.keys(selectedShows)
.filter(show=>selectedShows[show]);

if(activeShows.length === 0){
alert("Please select at least one show");
return;
}

localStorage.setItem(
"activeShows",
JSON.stringify(activeShows)
);

alert(
activeShows.length+
" shows selected"
);

startRanking(activeShows);

};

</script>

</body>
</html>
